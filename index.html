function token(g){let h=0;for(let i=0;i<g.length;i++)h=(Math.imul(31,h)+g.charCodeAt(i))|0;return Math.abs(h).toString(36).toUpperCase().padStart(6,"0");}

function enviarFila(grupo,docente,materia,resps,comentario){
  return new Promise(resolve=>{
    const p=new URLSearchParams({
      fecha:new Date().toLocaleString("es-MX"),
      grupo,docente,materia,
      p1:resps[0]||"",p2:resps[1]||"",p3:resps[2]||"",
      p4:resps[3]||"",p5:resps[4]||"",p6:resps[5]||"",
      p7:resps[6]||"",p8:resps[7]||"",p9:resps[8]||"",
      p10:resps[9]||"",comentarios:comentario||""
    });
    fetch(SCRIPT_URL+"?"+p.toString(),{mode:"no-cors"})
      .then(()=>resolve(true)).catch(()=>resolve(false));
    setTimeout(()=>resolve(true),8000);
  });
}

function acceder(){
  const cod=document.getElementById("cod").value.trim().toUpperCase();
  let g=Object.keys(GRUPOS).find(k=>k===cod)||Object.keys(GRUPOS).find(k=>token(k)===cod);
  if(g){estado.grupo=g;estado.paso=0;estado.respAll={};estado.comAll={};vistaFormulario();}
  else{document.getElementById("err").style.display="block";}
}

        <h2 style="margin-bottom:20px">Panel Admin</h2>
        <input type="password" id="pass" placeholder="Contraseña" style="width:100%;padding:12px;border-radius:8px;border:1px solid #d1d5db;font-size:15px;box-sizing:border-box;margin-bottom:12px"
          onkeydown="if(event.key==='Enter')checkPass()"/>
        <button class="btn-primary" onclick="checkPass()">Entrar</button>
        <button class="btn-secondary" style="margin-top:8px" onclick="vistaInicio()">← Volver</button>
        <p style="font-size:12px;color:#9ca3af;margin-top:12px">¿Olvidaste tu contraseña? Contacta al administrador.</p>
      </div>
    </div>`);
}

function checkPass(){
  if(document.getElementById("pass").value===ADMIN_PASS) vistaAdmin();
  else alert("Contraseña incorrecta");
}

function vistaFormulario(){
  const g=estado.grupo;
  const docs=GRUPOS[g];
  const idx=estado.paso;
  const doc=docs[idx];
  const key=doc.m+"|||"+doc.mat;
  const respD=estado.respAll[key]||{};
  const comD=estado.comAll[key]||"";
  const pct=Math.round((idx/docs.length)*100);

  let pregHtml="";
  PREGUNTAS.forEach((preg,i)=>{
    const esUlt=i===PREGUNTAS.length-1;
    const ops=esUlt?GEN:FREC;
    const cols=esUlt?COLG:COLF;
    let btns=ops.map(op=>{
      const sel=respD[i]===op;
      return `<button class="opt-btn${sel?" sel":""}" style="${sel?`background:${cols[op]};border-color:${cols[op]};color:#fff`:""}"
        onclick="setResp(${i},'${op}')">${op}</button>`;
    }).join("");
    pregHtml+=`
      <div style="margin-bottom:24px;padding-bottom:20px;border-bottom:${i<PREGUNTAS.length-1?"1px solid #f3f4f6":"none"}">
        <p style="margin:0 0 12px;color:#1f2937;font-weight:600;font-size:14px;line-height:1.5">${i+1}. ${preg}</p>
        <div style="display:flex;flex-wrap:wrap">${btns}</div>
      </div>`;
  });

  render(`
    <div style="min-height:100vh;background:#f9fafb">
      <div class="header"><h2>🎓 Evaluación Docente — Grupo ${g}</h2></div>
      <div style="max-width:720px;margin:0 auto;padding:20px 16px">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <p style="text-align:right;font-size:12px;color:#6b7280;margin-bottom:18px">Docente ${idx+1} de ${docs.length}</p>
        <div class="card">
          <div style="background:#f5f3ff;border-radius:10px;padding:14px 18px;margin-bottom:24px">
            <p class="label-sm">Docente</p>
            <h2 style="color:#1f2937;font-size:17px;margin-bottom:4px">${doc.m}</h2>
            <p style="color:#6b7280;font-size:13px">📚 ${doc.mat}</p>
          </div>
          ${pregHtml}
          <div style="margin-top:8px;padding-top:20px;border-top:1px solid #f3f4f6">
            <p style="margin:0 0 8px;color:#1f2937;font-weight:600;font-size:14px">💬 Comentarios finales (opcional)</p>
            <textarea id="com" rows="3" placeholder="Escribe aquí cualquier comentario adicional..."
              style="width:100%;box-sizing:border-box;padding:10px 14px;border-radius:10px;border:1px solid #e5e7eb;font-size:14px">${comD}</textarea>
          </div>
          <button class="btn-primary" style="margin-top:16px" onclick="siguiente()">
            ${idx<docs.length-1?"Siguiente docente →":"Enviar evaluación ✓"}
          </button>
        </div>
      </div>
    </div>`);
}

function setResp(i,val){
  const g=estado.grupo;
  const doc=GRUPOS[g][estado.paso];
  const key=doc.m+"|||"+doc.mat;
  if(!estado.respAll[key])estado.respAll[key]={};
  estado.respAll[key][i]=val;
  // guardar comentario antes de re-render
  const com=document.getElementById("com");
  if(com)estado.comAll[key]=com.value;
  vistaFormulario();
}

async function siguiente(){
  const g=estado.grupo;
  const docs=GRUPOS[g];
  const idx=estado.paso;
  const doc=docs[idx];
  const key=doc.m+"|||"+doc.mat;
  // guardar comentario
  const com=document.getElementById("com");
  if(com)estado.comAll[key]=com.value;
  // validar
  const respD=estado.respAll[key]||{};
  if(!PREGUNTAS.every((_,i)=>respD[i])){alert("Por favor responde todas las preguntas.");return;}
  if(idx<docs.length-1){estado.paso++;vistaFormulario();return;}
  // enviar todo
  render(`<div class="center"><div style="text-align:center;padding:40px"><div style="font-size:56px">📤</div><h2 style="color:#6366f1;margin-top:16px">Guardando evaluación...</h2><p style="color:#6b7280">Enviando a Google Sheets, por favor espera.</p></div></div>`);
  for(const d of docs){
    const k=d.m+"|||"+d.mat;
    const rs=estado.respAll[k]||{};
    await enviarFila(g,d.m,d.mat,PREGUNTAS.map((_,i)=>rs[i]||""),estado.comAll[k]||"");
  }
  render(`<div class="center"><div style="text-align:center;padding:40px;max-width:420px">
    <div style="font-size:72px">✅</div>
    <h2 style="color:#10b981;margin-top:16px">¡Evaluación enviada!</h2>
    <p style="color:#6b7280">Tus respuestas fueron registradas. ¡Gracias por participar!</p>
    <button class="btn-primary" style="margin-top:24px;max-width:200px" onclick="vistaInicio()">Volver al inicio</button>
  </div></div>`);
}

function vistaAdmin(){
  const gs=Object.keys(GRUPOS).sort();
  let filas=gs.map(g=>`
    <tr>
      <td style="padding:10px 14px;font-weight:600">${g}</td>
      <td style="padding:10px 14px;color:#6b7280;font-size:13px">${GRUPOS[g].length} docentes</td>
      <td style="padding:10px 14px">
        <input readonly value="${token(g)}" onclick="this.select()"
          class="token-input" style="width:130px;padding:6px 10px;font-size:16px;letter-spacing:4px"/>
      </td>
    </tr>`).join("");

  render(`
    <div style="min-height:100vh;background:#f9fafb">
      <div class="header" style="display:flex;justify-content:space-between;align-items:center">
        <h2>⚙️ Panel Administrativo — CBTis 281</h2>
        <button onclick="vistaInicio()" style="background:rgba(255,255,255,.2);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-weight:600">← Salir</button>
      </div>
      <div style="max-width:800px;margin:0 auto;padding:24px 16px">
        <div class="card">
          <h3 style="margin-bottom:16px">🔑 Códigos de acceso por grupo</h3>
          <p style="color:#6b7280;font-size:13px;margin-bottom:16px">Comparte el código de cada grupo con sus alumnos. Haz clic en el código para seleccionarlo y cópialo con Ctrl+C.</p>
          <div style="overflow-x:auto">
            <table style="width:100%;border-collapse:collapse">
              <thead>
                <tr style="background:#f3f4f6">
                  <th style="padding:10px 14px;text-align:left;font-size:13px">Grupo</th>
                  <th style="padding:10px 14px;text-align:left;font-size:13px">Docentes</th>
                  <th style="padding:10px 14px;text-align:left;font-size:13px">Código de acceso</th>
                </tr>
              </thead>
              <tbody>${filas}</tbody>
            </table>
          </div>
        </div>
        <div class="card" style="background:#fef9c3;border:1px solid #fde68a">
          <p style="color:#92400e;font-size:13px">📊 Para ver los resultados abre tu <strong>Google Sheet</strong> → pestaña <strong>"Evaluaciones"</strong>. Ahí están todos los datos guardados permanentemente.</p>
        </div>
      </div>
    </div>`);
}

vistaInicio();
</script>
</body>
</html>
